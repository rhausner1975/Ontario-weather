<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontario Weather Dashboard</title>
<style>
  :root {
    --bg-start: #dbeafe;
    --bg-end:   #f0f9ff;
    --card:     #ffffff;
    --text:     #0f172a;
    --muted:    #64748b;
    --accent:   #0284c7;
    --accent-2: #0ea5e9;
    --ok:       #16a34a;
    --warn:     #d97706;
    --alert:    #dc2626;
    --border:   #e2e8f0;
    --shadow:   0 1px 3px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.06);
    --radius:   16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 60%, #fef9c3 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    transition: padding 0.3s;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    transition: max-width 0.3s;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 10px;
  }
  h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; }
  h1 .flag { font-size: 1.5rem; margin-right: 6px; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #updated { font-size: 0.82rem; color: var(--muted); }

  .btn {
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.82rem;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  #refreshBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    box-shadow: 0 2px 6px rgba(2,132,199,0.3);
  }
  #refreshBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(2,132,199,0.4); }
  #refreshBtn:disabled { opacity: 0.55; cursor: wait; }

  #layoutBtn {
    background: #f1f5f9;
    color: var(--text);
    border: 1px solid var(--border);
  }
  #layoutBtn:hover { background: #e2e8f0; }

  /* GRID – DESKTOP */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  /* REGULAR CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(15,23,42,0.1); }
  .card-name {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }
  .card-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-icon { font-size: 2.8rem; line-height: 1; }
  .card-temp { font-size: 2.25rem; font-weight: 800; letter-spacing: -0.02em; }
  .card-cond { font-size: 0.92rem; font-weight: 500; margin-bottom: 8px; }
  .card-wind { font-size: 0.82rem; color: var(--muted); font-weight: 500; }

  /* KIRKLAND LAKE WIND WATCH */
  .kl-card {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #ffffff, #f0f9ff);
    border: 2px solid var(--accent);
    padding: 24px;
    box-shadow: 0 4px 16px rgba(2,132,199,0.15);
  }
  .kl-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .kl-title { font-size: 1rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }

  .status-badge {
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-ok    { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .status-warn  { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
  .status-alert { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: 0.72; } }

  .kl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
  }
  .kl-stat {
    background: #fff;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .kl-stat-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .kl-stat-value { font-size: 1.3rem; font-weight: 800; }
  .kl-stat-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

  /* ── PHONE MODE (Samsung Z Fold4 – folded ~390px, unfolded ~768px) ── */
  body.phone-mode {
    padding: 10px;
  }
  body.phone-mode .container {
    max-width: 430px;   /* targets folded Z Fold4; scales up nicely when unfolded */
  }
  body.phone-mode h1 { font-size: 1.1rem; }
  body.phone-mode #updated { font-size: 0.75rem; }
  body.phone-mode .btn { padding: 7px 12px; font-size: 0.78rem; }

  body.phone-mode .grid {
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }
  body.phone-mode .card { padding: 12px; border-radius: 14px; }
  body.phone-mode .card-name { font-size: 0.65rem; margin-bottom: 9px; }
  body.phone-mode .card-icon { font-size: 1.9rem; }
  body.phone-mode .card-temp { font-size: 1.55rem; }
  body.phone-mode .card-cond { font-size: 0.78rem; }
  body.phone-mode .card-wind { font-size: 0.72rem; }

  body.phone-mode .kl-card  { padding: 14px; }
  body.phone-mode .kl-title { font-size: 0.8rem; }
  body.phone-mode .kl-grid  { grid-template-columns: 1fr 1fr; gap: 8px; }
  body.phone-mode .kl-stat  { padding: 10px 12px; border-radius: 10px; }
  body.phone-mode .kl-stat-value { font-size: 0.98rem; }
  body.phone-mode .kl-stat-sub   { font-size: 0.67rem; }

  footer {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; font-weight: 600; }

  .loading { color: var(--muted); font-style: italic; font-size: 0.9rem; }
  .error-card {
    grid-column: 1 / -1;
    color: var(--alert);
    background: #fff5f5;
    border-color: #fca5a5;
    font-size: 0.9rem;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="flag">🍁</span>Ontario Weather</h1>
    <div class="header-controls">
      <span id="updated">Loading…</span>
      <button class="btn" id="layoutBtn" onclick="toggleLayout()">📱 Phone View</button>
      <button class="btn" id="refreshBtn" onclick="loadAll()">⟳ Refresh</button>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    Data: <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> (aggregates ECCC &amp; global models) · Wind km/h · Temp °C · Auto-refreshes every 15 min
  </footer>
</div>

<script>
// Kirkland Lake is LAST so Wind Watch panel always renders at the bottom
const LOCATIONS = [
  { name: "Mississauga",   lat: 43.5890, lon: -79.6441 },
  { name: "Oshawa",        lat: 43.8971, lon: -78.8658 },
  { name: "Marmora",       lat: 44.4834, lon: -77.6789 },
  { name: "Cobalt",        lat: 47.3929, lon: -79.6855 },
  { name: "Matachewan",    lat: 47.9334, lon: -80.6500 },
  { name: "Matheson",      lat: 48.5334, lon: -80.4667 },
  { name: "Kapuskasing",   lat: 49.4167, lon: -82.4333 },
  { name: "Kirkland Lake", lat: 48.1468, lon: -80.0333, featured: true },
];

const STORM_THRESHOLD = 50;
const SUSTAINED_HOURS = 3;

// Layout toggle
let phoneMode = false;
function toggleLayout() {
  phoneMode = !phoneMode;
  document.body.classList.toggle("phone-mode", phoneMode);
  document.getElementById("layoutBtn").textContent = phoneMode ? "🖥️ Desktop View" : "📱 Phone View";
}

function codeInfo(c) {
  const m = {
    0:  ["☀️","Sunny"],         1:  ["🌤️","Mainly Clear"],
    2:  ["⛅","Partly Cloudy"], 3:  ["☁️","Overcast"],
    45: ["🌫️","Fog"],           48: ["🌫️","Freezing Fog"],
    51: ["🌦️","Light Drizzle"], 53: ["🌦️","Drizzle"],      55: ["🌦️","Heavy Drizzle"],
    56: ["🌧️","Frz Drizzle"],   57: ["🌧️","Frz Drizzle"],
    61: ["🌧️","Light Rain"],    63: ["🌧️","Rain"],          65: ["🌧️","Heavy Rain"],
    66: ["🌧️","Freezing Rain"], 67: ["🌧️","Freezing Rain"],
    71: ["🌨️","Light Snow"],    73: ["🌨️","Snow"],          75: ["❄️","Heavy Snow"],
    77: ["❄️","Snow Grains"],
    80: ["🌦️","Rain Showers"],  81: ["🌧️","Rain Showers"],  82: ["⛈️","Heavy Showers"],
    85: ["🌨️","Snow Showers"],  86: ["❄️","Heavy Snow Showers"],
    95: ["⛈️","Thunderstorm"],  96: ["⛈️","Thunder/Hail"],  99: ["⛈️","Severe Thunder"],
  };
  return m[c] || ["❓","Unknown"];
}

async function fetchCurrent(loc) {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`
    + `&current=temperature_2m,weather_code,wind_speed_10m`
    + `&wind_speed_unit=kmh&temperature_unit=celsius&timezone=America/Toronto`
  );
  if (!r.ok) throw new Error("API error");
  return r.json();
}

async function fetchKirkland(loc) {
  const r = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`
    + `&current=temperature_2m,weather_code,wind_speed_10m`
    + `&hourly=wind_speed_10m&forecast_days=3`
    + `&wind_speed_unit=kmh&temperature_unit=celsius&timezone=America/Toronto`
  );
  if (!r.ok) throw new Error("API error");
  return r.json();
}

function analyzeWind(times, speeds, startH, endH) {
  const now = new Date();
  const sel = [];
  for (let i = 0; i < times.length; i++) {
    const h = (new Date(times[i]) - now) / 3.6e6;
    if (h >= startH && h <= endH) sel.push(speeds[i]);
  }
  if (!sel.length) return null;
  const min = Math.min(...sel), max = Math.max(...sel);
  const avg = sel.reduce((a,b)=>a+b,0) / sel.length;
  let run = 0, storm = false;
  for (const w of sel) { run = w > STORM_THRESHOLD ? run+1 : 0; if (run >= SUSTAINED_HOURS) storm = true; }
  return { min, max, avg, storm };
}

function renderCard(loc, data) {
  const [icon, label] = codeInfo(data.current.weather_code);
  const temp = Math.round(data.current.temperature_2m);
  const wind = Math.round(data.current.wind_speed_10m);
  return `<div class="card">
    <div class="card-name">${loc.name}</div>
    <div class="card-main"><div class="card-icon">${icon}</div><div class="card-temp">${temp}°</div></div>
    <div class="card-cond">${label}</div>
    <div class="card-wind">💨 ${wind} km/h</div>
  </div>`;
}

function renderKirkland(loc, data) {
  const [icon, label] = codeInfo(data.current.weather_code);
  const temp = Math.round(data.current.temperature_2m);
  const wind = Math.round(data.current.wind_speed_10m);
  const w24  = analyzeWind(data.hourly.time, data.hourly.wind_speed_10m, 0, 24);
  const w48  = analyzeWind(data.hourly.time, data.hourly.wind_speed_10m, 24, 48);

  const breach = w24?.storm || w48?.storm;
  const watch  = !breach && (w24?.max > 40 || w48?.max > 40);

  const badge = breach
    ? `<span class="status-badge status-alert">⚠ Storm Mode</span>`
    : watch
      ? `<span class="status-badge status-warn">⚡ Watch</span>`
      : `<span class="status-badge status-ok">✓ Normal</span>`;

  const fmt = w => w ? `${Math.round(w.min)}–${Math.round(w.max)} km/h` : "—";
  const sub = w => w ? `avg ${Math.round(w.avg)} km/h` : "";

  return `<div class="card kl-card">
    <div class="kl-header">
      <div class="kl-title">🎯 Kirkland Lake — Wind Watch</div>
      ${badge}
    </div>
    <div class="kl-grid">
      <div class="kl-stat">
        <div class="kl-stat-label">Current</div>
        <div class="kl-stat-value">${icon} ${temp}°C</div>
        <div class="kl-stat-sub">${label} · 💨 ${wind} km/h</div>
      </div>
      <div class="kl-stat">
        <div class="kl-stat-label">Wind · Next 24h</div>
        <div class="kl-stat-value">${fmt(w24)}</div>
        <div class="kl-stat-sub">${sub(w24)}</div>
      </div>
      <div class="kl-stat">
        <div class="kl-stat-label">Wind · 24–48h</div>
        <div class="kl-stat-value">${fmt(w48)}</div>
        <div class="kl-stat-sub">${sub(w48)}</div>
      </div>
      <div class="kl-stat">
        <div class="kl-stat-label">Storm Threshold</div>
        <div class="kl-stat-value">&gt; ${STORM_THRESHOLD} km/h</div>
        <div class="kl-stat-sub">sustained ${SUSTAINED_HOURS}h+</div>
      </div>
    </div>
  </div>`;
}

async function loadAll() {
  const grid = document.getElementById("grid");
  const btn  = document.getElementById("refreshBtn");
  const upd  = document.getElementById("updated");
  btn.disabled = true;
  upd.textContent = "Fetching…";
  grid.innerHTML = LOCATIONS.map(l =>
    `<div class="card${l.featured?' kl-card':''}"><div class="card-name">${l.name}</div><div class="loading">Loading…</div></div>`
  ).join("");

  try {
    const results = await Promise.all(
      LOCATIONS.map(l => l.featured ? fetchKirkland(l) : fetchCurrent(l))
    );
    grid.innerHTML = LOCATIONS.map((l,i) =>
      l.featured ? renderKirkland(l, results[i]) : renderCard(l, results[i])
    ).join("");
    upd.textContent = "Updated " + new Date().toLocaleTimeString("en-CA", {hour:"2-digit", minute:"2-digit"});
  } catch(e) {
    grid.innerHTML = `<div class="card error-card">
      <strong>Could not load weather data.</strong><br>
      Open this file directly in Chrome, Edge, or Safari — the Cowork preview blocks external requests.
    </div>`;
    upd.textContent = "Error";
  } finally {
    btn.disabled = false;
  }
}

loadAll();
setInterval(loadAll, 15 * 60 * 1000);
</script>
</body>
</html>
